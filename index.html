<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>I got bored.</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    img {
      width: 700px;
      max-width: 95vw;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Mi GIF con música</h1>

  <img src="gif_girando_360_lento.gif" alt="GIF">

  <button id="playBtn">Entrar con sonido</button>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("musica");
    const btn = document.getElementById("playBtn");

    btn.addEventListener("click", async () => {
      try {
        await audio.play();
        btn.style.display = "none";
      } catch (e) {
        alert("El navegador bloqueó la reproducción automática.");
      }
    });
  </script>
</body>
</html>
